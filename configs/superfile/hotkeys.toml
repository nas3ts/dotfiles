##############################################
#                                            #
#        Superfile Keybindings (Yazi)        #
#                                            #
##############################################

# This contains the hotkey config file for superfile!
# Mapped to match Yazi keybindings where possible.

###############################################################################
#                                Global hotkeys                               #
###############################################################################

# Note: These hotkeys should be unique.

#-- Basic Actions (Yazi style)
confirm = ['enter', 'y', 'right', 'l']
quit = ['q', 'esc']
cd_quit = ['Q', '']

#-- Navigation (Yazi style)
list_down = ['j', 'down']
list_up = ['k', 'up']
page_down = ['pgdown', '']
page_up = ['pgup', '']

#-- File Panel Controls
close_file_panel = ['w', '']
create_new_file_panel = ['N', '']
next_file_panel = ['tab', 'L']
previous_file_panel = ['shift+left', 'H']
toggle_file_preview_panel = ['i', '']
toggle_reverse_sort = ['R', '']
pinned_directory = ['`', '']

#-- Focus Manipulation
focus_on_metadata = ['m', '']
focus_on_process_bar = ['<', '']
focus_on_sidebar = ['s', '']

#-- File/Dir Creation/Renaming (Yazi style)
file_panel_item_create = ['a', '']
file_panel_item_rename = ['r', '']

#-- Main File Operations (Yazi style)
copy_items = ['y', '']
cut_items = ['x', '']
delete_items = ['d', 'delete']
paste_items = ['p', '']
permanently_delete_items = ['D', '']

#-- Archive Manipulation
compress_file = ['ctrl+z', '']
extract_file = ['ctrl+e', '']

#-- Editor Actions
open_current_directory_with_editor = ['E', '']
open_file_with_editor = ['e', '']

#-- Other Actions (Yazi style)
change_panel_mode = ['v', '']
copy_path = ['ctrl+p', '']
copy_present_working_directory = ['c', '']
open_command_line = [':', '']
open_help_menu = ['?', '']
open_spf_prompt = ['>', '']
open_zoxide = ['z', '']
toggle_dot_file = ['.', '']
toggle_footer = ['F', '']

#-- Sorting (Yazi style)
open_sort_options_menu = [',', '']

###############################################################################
#                                Typing hotkeys                               #
###############################################################################

# Note: These hotkeys can override all hotkeys.

confirm_typing = ['enter', '']
cancel_typing = ['ctrl+c', 'esc']

###############################################################################
#                            Mode-Specific Hotkeys                            #
###############################################################################

# Note: These hotkeys can conflict with other modes, but but not with global
# hotkeys.

#-- Normal Mode Actions (Yazi style)
parent_directory = ['h', 'left', 'backspace']
search_bar = ['/', '']

#-- Selection Mode Actions
file_panel_select_mode_items_select_down = ['shift+down', 'J']
file_panel_select_mode_items_select_up = ['shift+up', 'K']
file_panel_select_all_items = ['ctrl+a', '']