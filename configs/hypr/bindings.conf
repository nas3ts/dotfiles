# Unbinds
unbind = SUPER, X
unbind = SUPER SHIFT, SPACE
unbind = SUPER, TAB
unbind = SUPER SHIFT, TAB
unbind = SUPER CTRL, I
unbind = SUPER CTRL, COMMA
unbind = SUPER, SPACE
unbind = SUPER ALT, SPACE
unbind = SUPER, ESCAPE

# Application bindings
bindd = SUPER, X, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, X, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER, E, Terminal File Manager, exec, omarchy-launch-tui yazi
bindd = SUPER CTRL, M, System Monitor, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, J, Jellyfin TUI, exec, omarchy-launch-tui jfsh
bindd = SUPER SHIFT, E, File manager, exec, omarchy-launch-tui spf
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, omarchy-launch-tui spf --cwd "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, B, Browser, exec, omarchy-launch-or-focus zen
bindd = SUPER SHIFT, B, Browser (private), exec, zen --private-window
bindd = SUPER, M, Music, exec, omarchy-launch-tui cliamp
bindd = SUPER SHIFT, M, Managarr, exec, omarchy-launch-tui managarr
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- bitwarden
bindd = SUPER, A, Opencode, exec, omarchy-launch-tui opencode
bindd = SUPER SHIFT, S, Smassh, exec, omarchy-launch-tui smassh
bindd = SUPER SHIFT, Z, Zed, exec, omarchy-launch-or-focus zeditor

# Web app bindings
# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment


# Extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server
bind = SUPER ALT, R, exec, hypr-reload
bind = SUPER ALT SHIFT, R, exec, hyprctl reload
bind = SUPER CTRL, P, exec, omarchy-menu power
bind = SUPER CTRL, COMMA, exec, dnd-toggle
bind = SUPER SHIFT, COMMA, exec, dunstctl close-all
bind = SUPER CTRL, I, exec, caffeine-toggle
bind = SUPER SHIFT, SPACE, exec, waybar-toggle
bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
bindd = SUPER ALT, SPACE, System menu, exec, omarchy-menu system
bindd = ALT, SPACE, System menu, exec, omarchy-launch-walker

bind = SUPER SHIFT, A, workspace, e-1
bind = SUPER SHIFT, D, workspace, e+1
